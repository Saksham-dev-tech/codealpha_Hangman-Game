<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Stack Hangman Game</title>
    <style>
        :root {
            --primary: #4a90e2;
            --background: #07cbfc;
            --card-bg: #ffffff;
            --text: #e60b0b;
            --danger: #e74c3c;
            --success: #0ee467;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vi;
            margin: 0;
        }

        .game-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 { margin-top: 0; color: var(--primary); }

        .word-display {
            font-size: 2.5rem;
            letter-spacing: 12px;
            margin: 25px 0;
            font-weight: bold;
            min-height: 60px;
        }

        .status-info {
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .danger-text { color: var(--danger); font-weight: bold; }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .key {
            background-color: #e0e6ed;
            border: none;
            padding: 12px 0;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .key:hover:not(:disabled) { background-color: var(--primary); color: white; }
        .key:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-restart {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-restart:hover { opacity: 0.9; }
        
        #message { font-size: 1.3rem; font-weight: bold; margin: 15px 0; }
        .won { color: var(--success); }
        .lost { color: var(--danger); }
    </style>
</head>
<body>

<div class="game-container">
    <h1>Hangman</h1>
    <p class="status-info">Lives Remaining: <span id="lives-count" class="danger-text">-</span></p>
    
    <div class="word-display" id="word-display">_ _ _ _</div>
    
    <div id="message"></div>

    <div class="keyboard" id="keyboard">
        </div>

    <button class="btn-restart" onclick="startNewGame()">New Game</button>
</div>

<script>
    const alphabet = 'abcdefghijklmnopqrstuvwxyz';
    let gameActive = true;

    // Initialize Virtual Keyboard
    const keyboardDiv = document.getElementById('keyboard');
    alphabet.split('').forEach(letter => {
        const button = document.createElement('button');
        button.innerText = letter.toUpperCase();
        button.className = 'key';
        button.id = `key-${letter}`;
        button.onclick = () => makeGuess(letter);
        keyboardDiv.appendChild(button);
    });

    async function startNewGame() {
        gameActive = true;
        document.getElementById('message').innerText = '';
        document.getElementById('message').className = '';
        
        // Reset keyboard buttons
        document.querySelectorAll('.key').forEach(btn => btn.disabled = false);

        const response = await fetch('/api/new-game', { method: 'POST' });
        const data = await response.json();
        updateUI(data);
    }

    async function makeGuess(letter) {
        if (!gameActive) return;

        // Disable the clicked button immediately
        document.getElementById(`key-${letter}`).disabled = true;

        const response = await fetch('/api/guess', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ letter: letter })
        });
        
        const data = await response.json();
        updateUI(data);
    }

    function updateUI(data) {
        // Update hidden word representation
        document.getElementById('word-display').innerText = data.word_display.join(' ');
        document.getElementById('lives-count').innerText = data.lives_left;

        // Check overall game status
        if (data.status === 'won') {
            const msg = document.getElementById('message');
            msg.innerText = "🎉 Congratulations! You Won!";
            msg.className = "won";
            gameActive = false;
            disableAllKeys();
        } else if (data.status === 'lost') {
            const msg = document.getElementById('message');
            msg.innerText = `💥 Game Over! The word was: ${data.secret_word.toUpperCase()}`;
            msg.className = "lost";
            gameActive = false;
            disableAllKeys();
        }
    }

    function disableAllKeys() {
        document.querySelectorAll('.key').forEach(btn => btn.disabled = true);
    }

    // Auto-load a game when page opens
    window.onload = startNewGame;
</script>
</body>
</html>
